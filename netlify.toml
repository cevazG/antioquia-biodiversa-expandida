# netlify.toml — Antioquia Biodiversa
# Frontend estático servido por Netlify.
# El backend (Node.js/Express) corre en el servidor de la Gobernación de Antioquia.

[build]
  publish = "."
  ignore  = "exit 0"   # sin paso de build; se sirven los archivos tal cual

# ── Redirects ────────────────────────────────────────────────────────────────

# Raíz → entrada de la app (la meta-refresh de index.html también lo hace,
# pero el redirect de Netlify es instantáneo y evita el parpadeo)
[[redirects]]
  from   = "/"
  to     = "/biodiversidad/index.html"
  status = 200

# Normalizar trailing slash en las rutas de la app para que i18n.js
# calcule bien la profundidad del URL (ver _autoPath en i18n.js)
[[redirects]]
  from   = "/biodiversidad/*/"
  to     = "/biodiversidad/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/agua/*/"
  to     = "/agua/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/comunidad/*/"
  to     = "/comunidad/:splat"
  status = 301
  force  = true

# ── Cabeceras de seguridad ────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# ── Cache de assets estáticos ─────────────────────────────────────────────────
# Los CSS y JS usan ?v=N en el HTML como cache buster, por lo que es seguro
# aplicar cache largo: el navegador solo reutiliza el archivo si la URL no cambia.

[[headers]]
  for = "/biodiversidad/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/biodiversidad/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/comunidad/jovenes_pa_lante/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"   # 30 días — fotos cambian mensualmente

[[headers]]
  for = "/biodiversidad/img/species/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"   # 1 h — JSON de datos puede actualizarse

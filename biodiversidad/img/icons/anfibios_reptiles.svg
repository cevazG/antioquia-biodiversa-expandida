<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Cuerpo de la rana (izquierda) -->
  <ellipse cx="20" cy="38" rx="11" ry="8" fill="#2E7D32"/>
  <!-- Cabeza rana -->
  <ellipse cx="20" cy="27" rx="9" ry="7" fill="#388E3C"/>
  <!-- Ojos rana -->
  <circle cx="13" cy="22" r="4" fill="#1B5E20"/>
  <circle cx="27" cy="22" r="4" fill="#1B5E20"/>
  <circle cx="12.5" cy="21.5" r="2" fill="white"/>
  <circle cx="26.5" cy="21.5" r="2" fill="white"/>
  <circle cx="13" cy="21.5" r="1" fill="#212121"/>
  <circle cx="27" cy="21.5" r="1" fill="#212121"/>
  <!-- Patas traseras rana -->
  <path d="M12 44 L6 50 M6 50 L4 54 M6 50 L8 54 M6 50 L10 53" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M28 44 L34 50 M34 50 L36 54 M34 50 L32 54 M34 50 L30 53" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Separador -->
  <line x1="37" y1="14" x2="37" y2="56" stroke="rgba(0,0,0,0.1)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Serpiente (derecha) -->
  <!-- Cuerpo en S -->
  <path d="M60 18 C58 22, 42 24, 44 32 C46 40, 60 42, 58 50 C56 56, 48 58, 44 56"
        stroke="#558B2F" stroke-width="5" stroke-linecap="round" fill="none"/>

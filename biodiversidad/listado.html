<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#018d38">
  <title>Especies · Antioquia Biodiversa</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">
  <link rel="stylesheet" href="css/listado.css">
  <link rel="preload" href="data/species.json" as="fetch">
  <link rel="preload" href="../data/translations.json" as="fetch">
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <button class="app-header__back" data-back aria-label="Volver">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>
      </button>
      <div class="app-header__title" id="header-title">Listado</div>
      <button class="app-header__lang" data-lang-toggle aria-label="Cambiar idioma">EN</button>
    </header>

    <!-- Contexto: subregión + grupo -->
    <div class="listado-context" id="listado-context">
      <span class="listado-context__deco" aria-hidden="true" id="context-deco">🌿</span>
      <div class="listado-context__breadcrumb" id="context-breadcrumb"></div>
      <div class="listado-context__title" id="context-title">Cargando...</div>
      <div class="listado-context__sub" id="context-sub"></div>
    </div>

    <!-- Barra de búsqueda + filtros (siempre visible) -->
    <div class="listado-toolbar">
      <div class="search-bar">
        <svg class="search-bar__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input
          type="search"
          id="search-input"
          class="search-bar__input"
          data-i18n-placeholder="search_placeholder"
          placeholder="Buscar especie o familia..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="search-bar__clear" id="search-clear" aria-label="Limpiar búsqueda">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Filtros (modo flora / fauna / búsqueda) -->
      <div class="filter-scroll" id="filter-bar" style="display:none">
        <!-- Se genera dinámicamente según el reino -->
      </div>
    </div>

    <!-- Cuerpo del listado -->
    <main class="listado-body" id="listado-body">
      <!-- Renderizado por JS -->
    </main>

    <!-- Bottom bar -->
    <nav class="bottom-bar" aria-label="Navegación principal">
      <button class="bottom-bar__btn" onclick="window.location.href='home.html'" aria-label="Inicio">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span data-i18n="home">Inicio</span>
      </button>
      <button class="bottom-bar__btn active" onclick="window.location.href='biodiversidad.html'" aria-label="Biodiversidad">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span data-i18n="nav_bio">Bio</span>
      </button>
      <button class="bottom-bar__btn" onclick="window.location.href='../agua/index.html'" aria-label="Agua">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6 8 4 12 4 15a8 8 0 0016 0c0-3-2-7-8-13z"/></svg>
        <span data-i18n="nav_agua">Agua</span>
      </button>
      <button class="bottom-bar__btn" onclick="window.location.href='../comunidad/index.html'" aria-label="Comunidad">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span data-i18n="com_titulo">Comunidad</span>
      </button>
    </nav>

    <!-- Scroll top -->
    <button class="scroll-top" aria-label="Volver arriba">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M18 15l-6-6-6 6"/></svg>
    </button>
  </div>

  <script src="js/i18n.js?v=3"></script>
  <script src="js/data.js?v=3"></script>
  <script src="js/nav.js?v=3"></script>
  <script src="js/app.js?v=3"></script>

  <script src="js/listado.js?v=3"></script>
</body>
</html>

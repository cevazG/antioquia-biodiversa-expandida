  <path d="M60 18 C58 22, 42 24, 44 32 C46 40, 60 42, 58 50 C56 56, 48 58, 44 56"
        stroke="#33691E" stroke-width="5" stroke-linecap="round" fill="none" stroke-dasharray="2,5" opacity="0.5"/>
  <!-- Cabeza serpiente -->
  <ellipse cx="60" cy="17" rx="5" ry="3.5" fill="#558B2F" transform="rotate(-10 60 17)"/>
  <!-- Ojo serpiente -->
  <circle cx="62" cy="15" r="1.5" fill="#212121"/>
  <circle cx="62.5" cy="14.5" r="0.5" fill="white"/>
  <!-- Lengua -->
  <path d="M56 18 L52 19 M52 19 L50 17 M52 19 L50 21" stroke="#B71C1C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>

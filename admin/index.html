<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Antioquia Biodiversa</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-card__logo">🌿</div>
    <h2>Antioquia Biodiversa</h2>
    <p class="login-card__sub">Panel de curación de contenido</p>
    <form id="loginForm">
      <input type="password" id="password" placeholder="Contraseña" required autofocus>
      <p class="error-msg" id="errorMsg" style="display:none">Contraseña incorrecta</p>
      <button type="submit" class="btn btn--primary btn--full">Ingresar</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="index.js"></script>
</body>
</html>

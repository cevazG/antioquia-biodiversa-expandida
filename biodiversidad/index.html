<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b5640">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Antioquia Biodiversa</title>
  <link rel="stylesheet" href="css/main.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/animations.css?v=2">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="lang-page">
    <div class="lang-page__bg"></div>
    <div class="lang-page__leaves" aria-hidden="true"></div>
    <div class="corner-leaf corner-leaf--tl" aria-hidden="true">🌿</div>
    <div class="corner-leaf corner-leaf--br" aria-hidden="true">🌿</div>

    <div class="lang-page__content">
      <!-- Logo oficial Gobernación de Antioquia -->
      <img src="img/logo/logo_gobernacion_white.png" class="brand-logo" alt="Escudo Gobernación de Antioquia">

      <!-- Nombre del proyecto -->
      <div class="brand-title">
        <h1>Antioquia<br>Biodiversa</h1>
        <p>Gobernación de Antioquia</p>
      </div>

      <!-- Selector de idioma -->
      <div class="gold-divider">
        <span id="lang-prompt">Elige tu idioma</span>
      </div>

      <div class="lang-options" role="list">
        <button
          class="lang-option ripple-container"
          onclick="selectLang('es')"
          role="listitem"
          aria-label="Español"
        >
          <span class="lang-option__flag" aria-hidden="true">🇨🇴</span>
          <div>
            <div class="lang-option__name">Español</div>
            <div class="lang-option__native">Colombia · Colombia</div>
          </div>
          <svg style="margin-left:auto" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <button
          class="lang-option ripple-container"
          onclick="selectLang('en')"
          role="listitem"
          aria-label="English"
        >
          <span class="lang-option__flag" aria-hidden="true">🇺🇸</span>
          <div>
            <div class="lang-option__name">English</div>
            <div class="lang-option__native">United States · EE.UU</div>
          </div>
          <svg style="margin-left:auto" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="lang-footer">
      <p>Antioquia Biodiversa &copy; 2026</p>
    </div>
  </div>

  <script src="js/index.js?v=2"></script>
</body>
</html>

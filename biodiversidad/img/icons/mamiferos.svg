<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Huella de pata grande (mamífero) -->
  <!-- Almohadilla central -->
  <ellipse cx="32" cy="42" rx="13" ry="10" fill="#5D4037"/>
  <!-- Almohadilla central highlight -->
  <ellipse cx="30" cy="40" rx="5" ry="4" fill="#795548" opacity="0.5"/>

  <!-- Dedos (4 almohadillas superiores) -->

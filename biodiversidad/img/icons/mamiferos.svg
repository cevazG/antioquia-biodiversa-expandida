  <ellipse cx="26" cy="22" rx="6" ry="5" fill="#5D4037" transform="rotate(-8 26 22)"/>
  <ellipse cx="37" cy="22" rx="6" ry="5" fill="#5D4037" transform="rotate(8 37 22)"/>
  <ellipse cx="47" cy="28" rx="6" ry="5" fill="#5D4037" transform="rotate(20 47 28)"/>


<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3561ab">
  <title>Subregión Hídrica · Antioquia</title>
  <link rel="stylesheet" href="../biodiversidad/css/main.css">
  <link rel="stylesheet" href="../biodiversidad/css/components.css">
  <link rel="stylesheet" href="../biodiversidad/css/animations.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="subregion.css">
</head>
<body>
<div class="agua-sub-page">

  <div class="map-header">
    <button class="map-header__back" onclick="history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>
    </button>
    <div style="flex:1">
      <div class="map-header__title" id="header-nombre">Cargando…</div>
      <div class="map-header__subtitle" id="header-sub">Red Hídrica · Antioquia</div>
    </div>
    <span class="tipo-pill" id="tipo-label">—</span>
    <button data-lang-toggle style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:white;padding:4px 10px;border-radius:20px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;">EN</button>
  </div>

  <!-- Mini mapa con pin de la subregión -->
  <div id="mini-map"></div>

  <!-- Contenido desplazable -->
  <div class="sub-content anim-stagger">

    <div class="stats-row" id="stats-row"></div>

    <div id="lista-container"></div>

  </div>

  <nav class="bottom-bar" aria-label="Navegación">
    <button class="bottom-bar__btn" onclick="window.location.href='../biodiversidad/home.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span data-i18n="home">Inicio</span>
    </button>
    <button class="bottom-bar__btn" onclick="window.location.href='../biodiversidad/biodiversidad.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span data-i18n="nav_bio">Bio</span>
    </button>
    <button class="bottom-bar__btn active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6 8 4 12 4 15a8 8 0 0016 0c0-3-2-7-8-13z"/></svg>
      <span data-i18n="nav_agua">Agua</span>
    </button>
    <button class="bottom-bar__btn" onclick="window.location.href='../comunidad/index.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span data-i18n="com_titulo">Comunidad</span>
    </button>
  </nav>
</div>

<!-- Leaflet JS -->
<script src="../biodiversidad/js/i18n.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="subregion.js"></script>
</body>
</html>
